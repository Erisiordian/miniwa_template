<div class="page">
  <div class="top">
    <h2>Notebooks</h2>
    <button (click)="create()" [disabled]="loading()">+ New</button>
  </div>

  <div *ngIf="error()" class="error">{{ error() }}</div>
  <div *ngIf="loading()">Loading…</div>

  <div class="list">
    <div class="card" *ngFor="let nb of items()">
      <a [routerLink]="['/notebooks', nb._id]">{{ nb.title }}</a>
      <div class="meta">Updated: {{ nb.updatedAt | date:'short' }}</div>
      <button (click)="remove(nb._id)">Delete</button>
    </div>
  </div>
</div>
