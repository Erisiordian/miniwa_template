<div class="wrap">
  <div class="card auth">
    <h2>Register</h2>
    <p class="muted">Create an account for your MiniWA workspace.</p>

    <label class="label">Email</label>
    <input class="input" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" />

    <label class="label">Password</label>
    <input class="input" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" />

    <div class="ok" *ngIf="ok()">{{ ok() }}</div>
    <div class="err" *ngIf="error()">{{ error() }}</div>

    <button class="btn primary full" (click)="submit()" [disabled]="loading()">Create account</button>
    <div class="muted small">Have an account? <a routerLink="/login" class="link">Login</a></div>
  </div>
</div>
