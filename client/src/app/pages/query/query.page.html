<div class="page">
  <h1>MiniWA</h1>

  <div class="search">
    <input
      type="text"
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      placeholder="Enter a query… e.g. gcd 120 45 | factor 360 | 2*(3+4)^2"
    />
    <button (click)="run()" [disabled]="loading()">Run</button>
  </div>

  <div *ngIf="loading()">Computing…</div>
  <div *ngIf="error()" class="error">{{ error() }}</div>

  <div *ngIf="result() as r" class="pods">
    <div *ngFor="let pod of r.pods" class="pod">
      <h3>{{ pod.title }}</h3>

      <div *ngIf="pod.type === 'text'">
        {{ pod.value }}
      </div>

      <div *ngIf="pod.type === 'keyvalue'">
        <div *ngFor="let k of objectKeys(pod.value)">
          <b>{{ k }}:</b> {{ pod.value[k] }}
        </div>
      </div>

      <div *ngIf="pod.type !== 'text' && pod.type !== 'keyvalue'">
        Unsupported pod type: {{ pod.type }}
      </div>
    </div>
  </div>
</div>
