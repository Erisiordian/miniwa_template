<div class="app-shell">
  <header class="topbar">
    <button class="icon-btn mobile-only" (click)="toggleSidebar()" aria-label="Toggle menu">☰</button>
    <div class="brand">
      <span class="brand-logo">∑</span><span class="brand-title">MiniWA</span><span class="brand-sub">Query Engine</span>
    </div>
    <div class="topbar-right" *ngIf="!isAuthed(); else authed">
      <a class="link" routerLink="/login">Login</a>
      <a class="btn primary" routerLink="/register">Register</a>
    </div>
    <ng-template #authed>
      <div class="topbar-right">
        <span class="me">{{ auth.userEmail() }}</span>
        <button class="btn" (click)="logout()">Logout</button>
      </div>
    </ng-template>
  </header>

  <div class="content">
    <aside class="sidebar" [class.open]="sidebarOpen()">
      <nav class="nav" (click)="sidebarOpen.set(false)">
        <a routerLink="/query" routerLinkActive="active">Query</a>
        <a routerLink="/history" routerLinkActive="active">History</a>
        <a routerLink="/notebooks" routerLinkActive="active">Notebooks</a>
      </nav>
      <div class="sidebar-footer">
        <div class="hint-title">Examples</div>
        <div class="hint mono">solve x^2-5x+6=0 for x</div>
        <div class="hint mono">integral sin(x) by x</div>
        <div class="hint mono">hash sha256 "hello"</div>
        <div class="hint mono">wiki Fourier transform</div>
      </div>
    </aside>

    <main class="main" (click)="sidebarOpen.set(false)">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
